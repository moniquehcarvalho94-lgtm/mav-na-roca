<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>MAV NA ROÇA — Vendas</title>
<style>
  :root{
    --wood-dark:#3b2a1f;
    --wood:#6b4a30;
    --wood-light:#a9784f;
    --cream:#f7f0df;
    --gold:#c99a3e;
    --green:#4f6228;
    --red:#a83232;
    --ink:#241a12;
    --card:#ffffff;
    --bg:#f4ede1;
    --shadow:0 2px 8px rgba(59,42,31,0.15);
    font-family: Arial, Helvetica, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    padding-bottom:90px;
  }
  header{
    background:linear-gradient(135deg,var(--wood-dark),var(--wood));
    color:var(--cream); padding:14px 16px 12px;
    box-shadow:var(--shadow);
    text-align:center;
  }
  header .logo-img{
    display:block; margin:0 auto; max-width:190px; width:55%; height:auto;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.35));
  }
  header .header-title{
    margin:2px 0 0; font-size:.95rem; font-weight:bold; letter-spacing:4px; color:var(--gold);
  }
  header p{margin:4px 0 0; font-size:.8rem; opacity:.85;}
  #status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;background:#999;}
  #status-dot.ok{background:#5cb85c;}
  #status-dot.err{background:var(--red);}

  .tabs{
    display:flex; gap:8px; overflow-x:auto; padding:12px 12px 4px;
    -webkit-overflow-scrolling:touch;
  }
  .tab-btn{
    flex:0 0 auto; padding:9px 14px; border-radius:20px; border:1px solid var(--wood-light);
    background:var(--card); color:var(--wood-dark); font-weight:bold; font-size:.85rem;
    cursor:pointer; white-space:nowrap;
  }
  .tab-btn.active{background:var(--gold); color:var(--wood-dark); border-color:var(--gold);}

  main{padding:8px 12px 12px;}

  .item-grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px;
    margin-bottom:16px;
  }
  .item-card{
    background:var(--card); border-radius:10px; padding:12px; box-shadow:var(--shadow);
    display:flex; flex-direction:column; gap:6px; border:2px solid transparent;
  }
  .item-card.in-cart{border-color:var(--gold);}
  .item-card .nome{font-weight:bold; font-size:.92rem; line-height:1.2;}
  .item-card .preco{color:var(--wood); font-size:.85rem;}
  .qty-row{display:flex; align-items:center; justify-content:space-between; margin-top:auto;}
  .qty-btn{
    width:32px; height:32px; border-radius:8px; border:none; background:var(--wood);
    color:#fff; font-size:1.1rem; cursor:pointer; line-height:1;
  }
  .qty-btn:active{background:var(--wood-dark);}
  .qty-val{min-width:24px; text-align:center; font-weight:bold;}

  section.card{
    background:var(--card); border-radius:12px; padding:14px; box-shadow:var(--shadow); margin-bottom:16px;
  }
  section.card h2{margin:0 0 10px; font-size:1rem; color:var(--wood-dark);}

  .cart-row{display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px dashed #e3d9c4; font-size:.88rem;}
  .cart-row:last-child{border-bottom:none;}
  .cart-row .rm{color:var(--red); background:none; border:none; cursor:pointer; font-size:1rem; padding:0 4px;}
  .cart-empty{color:#999; font-size:.85rem; padding:6px 0;}

  .totals{margin-top:8px; padding-top:8px; border-top:2px solid var(--wood-light);}
  .totals .row{display:flex; justify-content:space-between; padding:4px 0; font-size:.95rem;}
  .totals .row.total{font-size:1.25rem; font-weight:bold; color:var(--wood-dark);}
  .totals .row.troco{font-weight:bold;}
  .totals .row.troco.ok{color:var(--green);}
  .totals .row.troco.bad{color:var(--red);}

  .pagamento-row{margin-top:10px;}
  .pag-tabs{display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:6px;}
  .pag-tabs.pag-tabs-single{grid-template-columns:1fr;}
  .pag-btn{
    padding:10px 4px; border-radius:8px; border:1px solid var(--wood-light);
    background:var(--card); color:var(--wood-dark); font-weight:bold; font-size:.78rem;
    cursor:pointer;
  }
  .pag-btn.active{background:var(--gold); border-color:var(--gold); color:var(--wood-dark);}

  input[type=number]{
    width:100%; padding:10px; border-radius:8px; border:1px solid #d8cbb0; font-size:1rem;
    font-family:inherit;
  }
  label{font-size:.82rem; color:#6b5a45; font-weight:bold; display:block; margin-bottom:4px;}

  .confirm-btn{
    width:100%; padding:14px; border:none; border-radius:10px; background:var(--green);
    color:#fff; font-size:1.05rem; font-weight:bold; cursor:pointer; margin-top:12px;
  }
  .confirm-btn:disabled{background:#b7b7a4; cursor:not-allowed;}
  .confirm-btn:active:not(:disabled){filter:brightness(.92);}

  .hist-item{padding:8px 0; border-bottom:1px solid #eee; font-size:.85rem;}
  .hist-item .top{display:flex; justify-content:space-between; align-items:center; font-weight:bold; color:var(--wood-dark);}
  .hist-item .sub{color:#777; font-size:.8rem;}
  .hist-item.cancelada{opacity:.55;}
  .hist-item.cancelada .top, .hist-item.cancelada .sub{text-decoration:line-through;}
  .hist-badge{font-size:.68rem; font-weight:bold; color:#fff; background:var(--red); border-radius:8px; padding:2px 7px; text-decoration:none !important; display:inline-block; margin-left:6px;}
  .hist-filtro{margin:2px 0 10px;}
  .hist-filtro label{display:inline; margin-right:6px; font-size:.8rem;}
  #hist-filtro-select{
    padding:7px 8px; border-radius:8px; border:1px solid var(--wood-light);
    background:var(--card); color:var(--wood-dark); font-weight:bold; font-size:.82rem;
    font-family:inherit; max-width:100%;
  }
  .hist-total{
    margin-top:8px; padding:8px 10px; border-radius:8px; background:var(--bg);
    border:1px solid var(--wood-light); color:var(--wood-dark); font-weight:bold; font-size:.92rem;
  }
  .cancel-btn{background:none; border:1px solid var(--red); color:var(--red); border-radius:14px; padding:3px 9px; font-size:.72rem; font-weight:bold; cursor:pointer; margin-top:4px;}
  .cancel-pass-row{display:flex; gap:6px; margin-top:6px; align-items:center;}
  .cancel-pass-input{flex:1; min-width:0; padding:6px 8px; border-radius:8px; border:1px solid var(--red); font-size:.85rem; font-family:inherit;}
  .cancel-pass-ok{background:var(--red); color:#fff; border:none; border-radius:8px; padding:6px 10px; font-size:.78rem; font-weight:bold; cursor:pointer;}
  .cancel-pass-x{background:none; border:1px solid #ccc; color:#777; border-radius:8px; padding:6px 9px; font-size:.78rem; cursor:pointer;}

  #toast{
    position:fixed; left:50%; bottom:20px; transform:translateX(-50%) translateY(20px);
    background:var(--wood-dark); color:var(--cream); padding:10px 18px; border-radius:24px;
    font-size:.9rem; opacity:0; transition:all .25s; pointer-events:none; box-shadow:var(--shadow);
    white-space:nowrap;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  details.settings{margin:10px 12px 0; font-size:.8rem; color:#6b5a45;}
  details.settings input{width:100%; padding:8px; border-radius:6px; border:1px solid #d8cbb0; margin-top:6px; font-family:inherit;}
  details.settings .save-url{margin-top:6px; padding:8px 12px; border:none; border-radius:6px; background:var(--wood); color:#fff; cursor:pointer;}

  .refresh-btn{background:none; border:1px solid var(--wood-light); color:var(--wood); border-radius:16px; padding:4px 10px; font-size:.75rem; cursor:pointer; float:right;}

  .barraca-pass-overlay{
    display:none; position:fixed; inset:0; background:rgba(36,26,18,.6);
    align-items:center; justify-content:center; z-index:50; padding:16px;
  }
  .barraca-pass-overlay.show{display:flex;}
  .barraca-pass-box{
    background:var(--card); border-radius:14px; padding:20px; width:100%; max-width:280px;
    box-shadow:var(--shadow); text-align:center;
  }
  .barraca-pass-title{font-size:.95rem; color:var(--wood-dark); margin-bottom:12px; line-height:1.35;}
  .barraca-pass-title strong{font-size:1.05rem; letter-spacing:.5px;}
  #barraca-pass-input{
    width:100%; padding:10px; border-radius:8px; border:1px solid #d8cbb0; font-size:1rem;
    font-family:inherit; text-align:center;
  }
  .barraca-pass-err{color:var(--red); font-size:.78rem; min-height:16px; margin-top:6px;}
  .barraca-pass-actions{display:flex; gap:8px; margin-top:12px;}
  .barraca-pass-actions button{flex:1; padding:10px; border-radius:8px; border:none; font-weight:bold; font-size:.85rem; cursor:pointer;}
  #barraca-pass-cancel{background:none; border:1px solid #ccc; color:#777;}
  #barraca-pass-ok{background:var(--green); color:#fff;}
</style>
</head>

  "Kids": "uva",
  "Pastéis & Crepes": "banana",
  "Bebidas": "melancia",
  "Churrasco": "abacaxi",
  "Caldos & Lanches": "morango",
  "Cadeia do Louvor": "laranja",
  "Caixa Geral": "maracuja"
};
// ============================================================

let scriptUrlSessao = "";
function getScriptUrl(){
  if (scriptUrlSessao) return scriptUrlSessao;
  if (SCRIPT_URL && SCRIPT_URL.indexOf("COLOQUE_AQUI") === -1) return SCRIPT_URL;
  return "";
}
function salvarUrlSessao(){
  const v = document.getElementById('script-url-input').value.trim();
  if (v) { scriptUrlSessao = v; toast("URL definida para esta sessão"); carregarItens(); carregarHistorico(); }
}

// ============================================================
// JSONP — evita bloqueio de CORS ao chamar o Apps Script a partir
// de outro site (GitHub Pages, Google Sites, etc.)
// ============================================================
let jsonpCounter = 0;
function jsonpRequest(url, params){
  return new Promise((resolve, reject) => {
    const cbName = 'jsonp_cb_' + (jsonpCounter++) + '_' + Math.floor(Math.random()*1e9);
    const script = document.createElement('script');
    let finished = false;
    function cleanup(){
      delete window[cbName];
      script.remove();
      clearTimeout(timer);
    }
    window[cbName] = function(data){
      finished = true;
      cleanup();
      resolve(data);
    };
    const timer = setTimeout(() => {
      if (!finished){ cleanup(); reject(new Error('tempo esgotado ao contatar a planilha')); }
    }, 15000);
    script.onerror = () => { if(!finished){ cleanup(); reject(new Error('não foi possível contatar o Apps Script')); } };
    const qs = Object.keys(params).map(k => encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('&');
    script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + qs + '&callback=' + cbName;
    document.head.appendChild(script);
  });
}

let ITENS = [];        // [{barraca,item,valor}]
let BARRACAS = [];
let barracaAtiva = "";
let carrinho = [];      // [{barraca,item,valorUnit,qtd}]
let formaPagamento = "";
let barracasDesbloqueadas = new Set(); // barracas já destravadas nesta sessão
let barracaPendente = null;            // barraca aguardando digitação de senha
let historicoVendas = [];              // cache das vendas já carregadas da planilha
let filtroHistorico = 'todas';         // 'todas' | 'caixa' — só usado com a Caixa Geral ativa

// "Caixa Geral" oferece todas as formas de pagamento normais.
// Qualquer outra barraca vende só em "Mav Cash" (funciona como dinheiro,
// então também mostra o campo de valor recebido / troco).
function ehCaixaGeral(barraca){
  return String(barraca || '').trim().toLowerCase() === 'caixa geral';
}
function formasParaBarraca(barraca){
  return ehCaixaGeral(barraca) ? ['Pix', 'Débito', 'Crédito', 'Dinheiro'] : ['Mav Cash'];
}
function formaTemTroco(forma){
  return forma === 'Dinheiro' || forma === 'Mav Cash';
}

function renderFormasPagamento(){
  const wrap = document.getElementById('pag-tabs');
  if (!barracaAtiva){
    wrap.className = 'pag-tabs';
    wrap.innerHTML = '';
    formaPagamento = '';
    document.getElementById('dinheiro-block').style.display = 'none';
    document.getElementById('recebido').value = '';
    atualizarBotaoConfirmar();
    return;
  }
  const formas = formasParaBarraca(barracaAtiva);
  wrap.className = 'pag-tabs' + (formas.length === 1 ? ' pag-tabs-single' : '');
  wrap.innerHTML = '';
  formas.forEach(f => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'pag-btn';
    btn.dataset.pag = f;
    btn.textContent = f;
    btn.addEventListener('click', () => selecionarPagamento(f));
    wrap.appendChild(btn);
  });
  if (formas.length === 1){
    selecionarPagamento(formas[0]);
  } else {
    formaPagamento = '';
    document.querySelectorAll('.pag-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('dinheiro-block').style.display = 'none';
    document.getElementById('recebido').value = '';
    atualizarBotaoConfirmar();
  }
}

function selecionarPagamento(forma){
  formaPagamento = forma;
  document.querySelectorAll('.pag-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.pag === forma);
  });
  const dinheiroBlock = document.getElementById('dinheiro-block');
  if (formaTemTroco(forma)){
    dinheiroBlock.style.display = '';
    atualizarTroco();
  } else {
    dinheiroBlock.style.display = 'none';
    document.getElementById('recebido').value = '';
  }
  atualizarBotaoConfirmar();
}

function atualizarBotaoConfirmar(){
  document.getElementById('confirm-btn').disabled = carrinho.length === 0 || !formaPagamento;
}

function fmt(v){
  return "R$ " + (Number(v)||0).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function setStatus(ok, msg){
  const dot = document.getElementById('status-dot');
  dot.className = ok ? 'ok' : 'err';
  document.getElementById('status-text').textContent = msg;
}

async function carregarItens(){
  const url = getScriptUrl();
  if (!url){ setStatus(false, "configure a URL do Apps Script acima ↑"); return; }
  setStatus(false, "conectando à planilha…");
  try{
    const data = await jsonpRequest(url, {action:'items'});
    if (!data.ok) throw new Error(data.erro || "erro desconhecido");
    ITENS = data.itens;
    BARRACAS = [...new Set(ITENS.map(i => i.barraca))];
    renderTabs();
    renderItens();
    renderFormasPagamento();
    popularFiltroHistoricoSelect();
    renderHistorico();
    setStatus(true, "conectado — dados ao vivo da planilha");
  }catch(err){
    setStatus(false, "falha ao conectar: " + err.message);
  }
}

function renderTabs(){
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = "";
  BARRACAS.forEach(b => {
    const btn = document.createElement('button');
    const bloqueada = SENHAS_BARRACA[b] && !barracasDesbloqueadas.has(b);
    btn.className = 'tab-btn' + (b === barracaAtiva ? ' active' : '');
    btn.textContent = bloqueada ? '🔒 ' + b : b;
    btn.onclick = () => tentarAbrirBarraca(b);
    tabs.appendChild(btn);
  });
}

function tentarAbrirBarraca(b){
  if (barracasDesbloqueadas.has(b) || !SENHAS_BARRACA[b]){
    abrirBarraca(b);
  } else {
    pedirSenhaBarraca(b);
  }
}

function abrirBarraca(b){
  barracaAtiva = b;
  renderTabs();
  renderItens();
  renderFormasPagamento();
  renderHistorico();
}

function pedirSenhaBarraca(b){
  barracaPendente = b;
  document.getElementById('barraca-pass-nome').textContent = b;
  document.getElementById('barraca-pass-err').textContent = '';
  const input = document.getElementById('barraca-pass-input');
  input.value = '';
  document.getElementById('barraca-pass-overlay').classList.add('show');
  setTimeout(() => input.focus(), 50);
}

function fecharSenhaBarraca(){
  barracaPendente = null;
  document.getElementById('barraca-pass-overlay').classList.remove('show');
}

function confirmarSenhaBarraca(){
  if (!barracaPendente) return;
  const input = document.getElementById('barraca-pass-input');
  const senha = input.value;
  if (senha === SENHAS_BARRACA[barracaPendente]){
    barracasDesbloqueadas.add(barracaPendente);
    const b = barracaPendente;
    fecharSenhaBarraca();
    abrirBarraca(b);
  } else {
    document.getElementById('barraca-pass-err').textContent = 'Senha incorreta';
    input.value = '';
    input.focus();
  }
}

document.getElementById('barraca-pass-ok').addEventListener('click', confirmarSenhaBarraca);
document.getElementById('barraca-pass-cancel').addEventListener('click', fecharSenhaBarraca);
document.getElementById('barraca-pass-input').addEventListener('keydown', e => { if (e.key === 'Enter') confirmarSenhaBarraca(); });

function qtdNoCarrinho(barraca, item){
  const linha = carrinho.find(c => c.barraca===barraca && c.item===item);
  return linha ? linha.qtd : 0;
}

function renderItens(){
  const grid = document.getElementById('item-grid');
  grid.innerHTML = "";
  if (!barracaAtiva){
    grid.innerHTML = '<div class="cart-empty">🔒 Toque em uma barraca acima e digite a senha para começar.</div>';
    return;
  }
  ITENS.filter(i => i.barraca === barracaAtiva).forEach(i => {
    const q = qtdNoCarrinho(i.barraca, i.item);
    const card = document.createElement('div');
    card.className = 'item-card' + (q>0 ? ' in-cart' : '');
    card.innerHTML = `
      <div class="nome">${i.item}</div>
      <div class="preco">${fmt(i.valor)}</div>
      <div class="qty-row">
        <button class="qty-btn" onclick="alterarQtd('${escapeAttr(i.barraca)}','${escapeAttr(i.item)}',${i.valor},-1)">–</button>
        <span class="qty-val">${q}</span>
        <button class="qty-btn" onclick="alterarQtd('${escapeAttr(i.barraca)}','${escapeAttr(i.item)}',${i.valor},1)">+</button>
      </div>`;
    grid.appendChild(card);
  });
}

function escapeAttr(s){ return String(s).replace(/'/g,"\\'"); }

function alterarQtd(barraca, item, valorUnit, delta){
  let linha = carrinho.find(c => c.barraca===barraca && c.item===item);
  if (!linha){
    if (delta < 0) return;
    linha = {barraca, item, valorUnit, qtd:0};
    carrinho.push(linha);
  }
  linha.qtd += delta;
  if (linha.qtd <= 0){
    carrinho = carrinho.filter(c => c !== linha);
  }
  renderItens();
  renderCarrinho();
}

function renderCarrinho(){
  const list = document.getElementById('cart-list');
  if (carrinho.length === 0){
    list.innerHTML = '<div class="cart-empty">Nenhum item selecionado ainda.</div>';
  } else {
    list.innerHTML = carrinho.map(c => `
      <div class="cart-row">
        <span>${c.qtd}x ${c.item} <small style="color:#999;">(${c.barraca})</small></span>
        <span>${fmt(c.qtd*c.valorUnit)} <button class="rm" onclick="removerItem('${escapeAttr(c.barraca)}','${escapeAttr(c.item)}')">✕</button></span>
      </div>`).join("");
  }
  const total = carrinho.reduce((s,c)=>s+c.qtd*c.valorUnit,0);
  document.getElementById('total-val').textContent = fmt(total);
  atualizarTroco();
  atualizarBotaoConfirmar();
}

function removerItem(barraca, item){
  carrinho = carrinho.filter(c => !(c.barraca===barraca && c.item===item));
  renderItens();
  renderCarrinho();
}

function atualizarTroco(){
  const total = carrinho.reduce((s,c)=>s+c.qtd*c.valorUnit,0);
  const recebido = Number(document.getElementById('recebido').value) || 0;
  const troco = recebido - total;
  const el = document.getElementById('troco-val');
  el.textContent = fmt(Math.abs(troco));
  el.parentElement.classList.remove('ok','bad');
  if (recebido > 0){
    el.parentElement.classList.add(troco >= 0 ? 'ok' : 'bad');
    el.textContent = (troco < 0 ? "falta " : "") + fmt(Math.abs(troco));
  } else {
    el.textContent = fmt(0);
  }
}
document.getElementById('recebido').addEventListener('input', atualizarTroco);

async function confirmarVenda(){
  const url = getScriptUrl();
  if (!url){ toast("Configure a URL do Apps Script primeiro"); return; }
  if (!formaPagamento){ toast("Selecione a forma de pagamento"); return; }
  const total = carrinho.reduce((s,c)=>s+c.qtd*c.valorUnit,0);
  let recebido, troco;
  if (formaTemTroco(formaPagamento)){
    recebido = Number(document.getElementById('recebido').value) || 0;
    troco = recebido - total;
  } else {
    recebido = total;
    troco = 0;
  }

  const payload = {
    vendaId: 'v' + Date.now() + '-' + Math.floor(Math.random()*1000),
    barraca: [...new Set(carrinho.map(c=>c.barraca))].join(', '),
    formaPagamento,
    itens: carrinho.map(c => ({item:c.item, qtd:c.qtd, valorUnit:c.valorUnit, subtotal:c.qtd*c.valorUnit})),
    total, recebido, troco,
    dataHora: new Date().toISOString()
  };

  const btn = document.getElementById('confirm-btn');
  btn.disabled = true; btn.textContent = "Salvando…";
  try{
    const data = await jsonpRequest(url, {action:'venda', payload: JSON.stringify(payload)});
    if (!data.ok) throw new Error(data.erro || "erro desconhecido");
    toast("Venda registrada ✔");
    carrinho = [];
    renderFormasPagamento();
    renderItens();
    renderCarrinho();
    carregarHistorico();
  }catch(err){
    toast("Erro ao salvar: " + err.message);
  }finally{
    btn.textContent = "Confirmar Venda";
    atualizarBotaoConfirmar();
  }
}

async function carregarHistorico(){
  const url = getScriptUrl();
  if (!url) return;
  const list = document.getElementById('hist-list');
  try{
    const data = await jsonpRequest(url, {action:'historico'});
    if (!data.ok) throw new Error(data.erro);
    const vendas = {};
    data.vendas.forEach(v => {
      if (!vendas[v.vendaId]) vendas[v.vendaId] = {vendaId:v.vendaId, dataHora:v.dataHora, barraca:v.barraca, formaPagamento:v.formaPagamento, total:v.total, recebido:v.recebido, troco:v.troco, cancelada:!!v.cancelada, itens:[]};
      if (v.cancelada) vendas[v.vendaId].cancelada = true;
      vendas[v.vendaId].itens.push(`${v.qtd}x ${v.item}`);
    });
    historicoVendas = Object.values(vendas);
    renderHistorico();
  }catch(err){
    list.innerHTML = '<div class="cart-empty">Erro ao carregar histórico: '+err.message+'</div>';
  }
}

// uma venda pode ter mais de uma barraca no campo (carrinho misto) — separa por vírgula
function vendaTemBarraca(v, b){
  return String(v.barraca || '').split(',').map(s => s.trim()).includes(b);
}

function popularFiltroHistoricoSelect(){
  const sel = document.getElementById('hist-filtro-select');
  sel.innerHTML = '<option value="todas">Todas as barracas</option>' +
    BARRACAS.map(b => `<option value="${escapeAttr(b)}">${b}</option>`).join('');
  if ([...sel.options].some(o => o.value === filtroHistorico)){
    sel.value = filtroHistorico;
  } else {
    filtroHistorico = 'todas';
    sel.value = 'todas';
  }
}

function selecionarFiltroHistorico(f){
  filtroHistorico = f;
  renderHistorico();
}

function renderHistorico(){
  const filtroWrap = document.getElementById('hist-filtro');
  const totalEl = document.getElementById('hist-total');
  const naCaixaGeral = ehCaixaGeral(barracaAtiva);
  filtroWrap.style.display = naCaixaGeral ? '' : 'none';

  const list = document.getElementById('hist-list');
  if (!barracaAtiva){
    list.innerHTML = '<div class="cart-empty">🔒 Selecione uma barraca acima para ver o histórico dela.</div>';
    totalEl.textContent = '';
    return;
  }

  let arr;
  if (naCaixaGeral){
    arr = filtroHistorico === 'todas' ? historicoVendas : historicoVendas.filter(v => vendaTemBarraca(v, filtroHistorico));
    const totalVendido = arr.filter(v => !v.cancelada).reduce((s,v) => s + (Number(v.total)||0), 0);
    const rotulo = filtroHistorico === 'todas' ? 'Total geral vendido' : `Total vendido — ${filtroHistorico}`;
    totalEl.textContent = `${rotulo}: ${fmt(totalVendido)}`;
  } else {
    arr = historicoVendas.filter(v => vendaTemBarraca(v, barracaAtiva));
    totalEl.textContent = '';
  }

  if (arr.length === 0){
    list.innerHTML = '<div class="cart-empty">Nenhuma venda registrada ainda.</div>';
    return;
  }
  list.innerHTML = arr.slice(0,50).map(v => `
    <div class="hist-item${v.cancelada ? ' cancelada' : ''}">
      <div class="top"><span>${v.barraca}${v.cancelada ? '<span class=\"hist-badge\">CANCELADA</span>' : ''}</span><span>${fmt(v.total)}</span></div>
      <div class="sub">${new Date(v.dataHora).toLocaleString('pt-BR')} · ${v.formaPagamento || '—'} · ${v.itens.join(', ')}${(!v.cancelada && formaTemTroco(v.formaPagamento)) ? ' · recebido '+fmt(v.recebido)+' · troco '+fmt(v.troco) : ''}</div>
      ${v.cancelada ? '' : `<button type="button" class="cancel-btn" onclick="iniciarCancelamento(this,'${escapeAttr(v.vendaId)}')">Cancelar venda</button>`}
    </div>`).join("");
}

function iniciarCancelamento(btnEl, vendaId){
  const row = document.createElement('div');
  row.className = 'cancel-pass-row';
  row.innerHTML = `
    <input type="password" inputmode="numeric" autocomplete="off" class="cancel-pass-input" placeholder="Senha">
    <button type="button" class="cancel-pass-ok">OK</button>
    <button type="button" class="cancel-pass-x">✕</button>
  `;
  btnEl.replaceWith(row);
  const input = row.querySelector('.cancel-pass-input');
  input.focus();

  row.querySelector('.cancel-pass-x').onclick = () => row.replaceWith(btnEl);

  const confirmar = () => confirmarCancelamento(row, btnEl, vendaId, input.value);
  row.querySelector('.cancel-pass-ok').onclick = confirmar;
  input.addEventListener('keydown', e => { if (e.key === 'Enter') confirmar(); });
}

async function confirmarCancelamento(row, btnEl, vendaId, senhaDigitada){
  if (senhaDigitada !== SENHA_CANCELAMENTO){
    toast('Senha incorreta');
    row.querySelector('.cancel-pass-input').value = '';
    row.querySelector('.cancel-pass-input').focus();
    return;
  }
  const url = getScriptUrl();
  if (!url) return;
  row.innerHTML = 'Cancelando…';
  try{
    const data = await jsonpRequest(url, {action:'cancelar', vendaId});
    if (!data.ok) throw new Error(data.erro || 'erro desconhecido');
    toast('Venda cancelada');
    carregarHistorico();
  }catch(err){
    toast('Erro ao cancelar: ' + err.message);
    row.replaceWith(btnEl);
  }
}

let toastTimer;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}

// init
carregarItens();
carregarHistorico();
</script>
